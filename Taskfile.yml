# Nexus Android — Taskfile
version: '3'

tasks:
  build:
    desc: Build debug APK
    cmds:
      - ./gradlew assembleDebug

  build-release:
    desc: Build release APK
    cmds:
      - ./gradlew assembleRelease

  test:
    desc: Run unit tests
    cmds:
      - ./gradlew test

  lint:
    desc: Run Android lint
    cmds:
      - ./gradlew lint

  clean:
    desc: Clean build artifacts
    cmds:
      - ./gradlew clean

  install:
    desc: Install debug APK on connected device
    cmds:
      - ./gradlew installDebug

  sync-core-libs:
    desc: Build nexus-core Android .so files and copy them into app jniLibs
    cmds:
      - cmd: cd ../nexus-core && powershell -ExecutionPolicy Bypass -File scripts/build-android-libs.ps1

  run-debug:
    desc: Build, install, and launch debug APK on local emulator
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/run-debug.ps1

  run-debug-fast:
    desc: Install and launch existing debug APK on local emulator
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/run-debug.ps1 -SkipBuild
